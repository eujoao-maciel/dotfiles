################
### MONITOR ###
################
monitor = HDMI-A-1,1920x1080@60,0x0,1

################
### PROGRAMS ###
################
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun --allow-images

################
### AUTOSTART ###
################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst &
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-kde-authentication-agent-1

#########################
### ENVIRONMENT VARS ###
#########################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEO_DRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = GTK_THEME,Breeze-Dark

########################
### LOOK AND FEEL ###
########################
general {
    gaps_in = 3
    gaps_out = 7
    border_size = 1

    col.active_border = rgba(150,150,150,1)
    col.inactive_border = rgba(150,150,150,1)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 2
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

################
### ANIMATIONS ###
################
animations {
    enabled = true

    bezier = smoothFast, 0.25, 1.00, 0.35, 1.00
    bezier = smoothEase, 0.40, 0.00, 0.60, 1.00
    bezier = quickSnap, 0.15, 0.00, 0.30, 1.00
    bezier = linear, 0.00, 0.00, 1.00, 1.00

    animation = windows,      1, 6, smoothFast, popin 80%
    animation = windowsIn,    1, 5, smoothFast, popin 80%
    animation = windowsOut,   1, 4, smoothEase, slide
    animation = windowsMove,  1, 4, quickSnap
    animation = border,       1, 8, smoothFast

    animation = fade,     1, 3, linear
    animation = fadeIn,   1, 4, smoothFast
    animation = fadeOut,  1, 3, linear

    animation = workspaces,     1, 5, smoothEase, slidefade 12%
    animation = workspacesIn,   1, 5, smoothEase, slidefade 12%
    animation = workspacesOut,  1, 5, smoothEase, slidefade 12%

    animation = layersIn,  1, 4, smoothEase, slide
    animation = layersOut, 1, 4, smoothEase, slide
}

################
### LAYOUTS ###
################
dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

##############
### INPUT ###
##############
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = abnt2

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDS ###
###################
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, X, exit
bind = $mainMod, Space, exec, $fileManager
bind = $mainMod, S, togglefloating
bind = $mainMod, A, exec, $menu
bind = $mainMod, F, fullscreen
bind = $mainMod, M, exec, flatpak run com.spotify.Client
bind = $mainMod, B, exec, firefox
bind = $mainMod, Escape, exec, killall waybar || waybar

bind = $mainMod, Print, exec, grim ~/Imagens/screenshots/$(date +"%Y-%m-%d_%H-%M-%S").png
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, P, pseudo
# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Media
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#########################
### WINDOW RULES ###
#########################
windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on
